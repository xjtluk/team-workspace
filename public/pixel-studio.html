<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel AI Studio - AI像素工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }

        #app {
            position: relative;
        }

        #pixelCanvas {
            border: 4px solid #444;
            image-rendering: pixelated;
            cursor: crosshair;
        }

        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            background: #1e2a2e;
            border: 3px solid #44aaff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: opacity 0.2s ease;
            opacity: 0;
            pointer-events: none;
        }

        .info-panel.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .panel-avatar {
            width: 64px;
            height: 64px;
            background: #333;
            border: 2px solid #666;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .panel-content h3 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .panel-content .title {
            color: #88aa88;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .panel-content .status {
            color: #ffcc66;
            font-size: 13px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="pixelCanvas" width="1000" height="700"></canvas>
        <div id="infoPanel" class="info-panel">
            <div class="panel-avatar" id="panelAvatar"></div>
            <div class="panel-content">
                <h3 id="panelName"></h3>
                <p id="panelTitle" class="title"></p>
                <p id="panelStatus" class="status"></p>
            </div>
        </div>
    </div>
    <script src="pixel-studio.js"></script>
</body>
</html>
